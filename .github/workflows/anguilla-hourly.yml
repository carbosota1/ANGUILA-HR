name: Anguilla Hourly Engine

on:
  schedule:
    # 7AM–11PM RD (UTC-4 -> 11–03 UTC)
    - cron: "*/10 11-23 * * *"
    - cron: "*/10 0-3 * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Forzar Telegram aunque ya haya enviado ese target"
        required: false
        default: "0"
      notify_dedupe:
        description: "Evitar duplicados (1=on, 0=off)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      TELEGRAM_NOTIFY: "1"
      NOTIFY_DEDUPE: ${{ github.event.inputs.notify_dedupe || '1' }}
      FORCE_NOTIFY: ${{ github.event.inputs.force_notify || '0' }}

      BOOTSTRAP_BACKFILL: "0"
      BOOTSTRAP_DAYS: "365"
      MIN_OK_DRAWS: "30"
      SEND_WARMUP_INFO: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl beautifulsoup4

      - name: Debug repo structure
        run: |
          echo "==== FILE TREE ===="
          find . -maxdepth 3 -type f | sort

      - name: Ensure folders
        run: |
          mkdir -p data outputs

      - name: Run Anguilla engine
        run: |
          if [ -f src/runner.py ]; then
            python src/runner.py
          elif [ -f runner.py ]; then
            python runner.py
          else
            echo "❌ No se encontró runner.py"
            exit 1
          fi

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/
          git diff --cached --quiet || git commit -m "Update Anguilla engine data/logs [skip ci]"
          git push